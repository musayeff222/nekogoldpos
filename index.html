<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEKO GOLD - Zərgərlik İdarəetmə Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f9e29b 50%, #b8860b 100%); }
        .dark-gold-bg { background-color: #1a1a1a; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* QƏBZ ÇAPI ÜÇÜN PROFESSİONAL VƏ STABİL CSS */
        @media print {
            /* 1. Brauzerin default boşluqlarını və rəng məhdudiyyətlərini ləğv et */
            @page {
                size: 80mm auto;
                margin: 0;
            }

            /* 2. Bütün ekran elementlərini tam gizlət */
            html, body {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                visibility: hidden !important;
            }

            /* 3. Yalnız qəbz konteynerini aktivləşdir və ən üstə gətir */
            #receipt-print {
                visibility: visible !important;
                display: block !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 80mm !important;
                margin: 0 !important;
                padding: 4mm !important;
                background: white !important;
                color: black !important;
                font-family: 'Courier New', Courier, monospace !important;
                font-size: 12px !important;
                line-height: 1.2 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #receipt-print * {
                visibility: visible !important;
            }

            /* 4. no-print sinfi olan hər şeyi gizlət */
            .no-print {
                display: none !important;
                visibility: hidden !important;
            }
        }
        
        /* Normal ekran rejimində qəbzi tam gizlət */
        #receipt-print {
            display: none;
        }
    </style>
<script type="importmap">
{
  "imports": {

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body class="bg-stone-50 text-stone-900 h-screen overflow-hidden">
    <div id="root"></div>
</body>
</html>
