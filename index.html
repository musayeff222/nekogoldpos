    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f9e29b 50%, #b8860b 100%); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Receipt specific styles for print */
        .brand-font {
            font-family: 'Georgia', serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @media print {
            @page { 
                size: 80mm auto; 
                margin: 0 !important; 
            }
            html, body { 
                height: auto !important; 
                overflow: visible !important; 
                background: white !important; 
                visibility: hidden !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
            #receipt-print {
                visibility: visible !important;
                display: block !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 80mm !important;
                margin: 0 !important;
                padding: 5mm 1mm !important;
                background: white !important;
                color: black !important;
                font-family: 'Courier New', Courier, monospace !important;
                font-weight: 550 !important;
                line-height: 1.2 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            #receipt-print * { visibility: visible !important; }
            .no-print { display: none !important; visibility: hidden !important; }
            
            .receipt-table {
                width: 100% !important;
                border-collapse: collapse !important;
                border-top: 1px solid black !important;
                border-bottom: 1px solid black !important;
            }
            .receipt-table th, .receipt-table td {
                border: 1px solid black !important;
                padding: 4px 2px !important;
                text-align: center !important;
                font-size: 11px !important;
            }
            .receipt-table th {
                text-transform: uppercase !important;
                font-size: 9px !important;
                font-weight: bold !important;
            }
        }
        
        #receipt-print { display: none; }
    </style>
